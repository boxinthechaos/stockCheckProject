<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>마이페이지</title>
    <style>
        body {
            background-color: black;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .header-container {
            position: relative;
            margin-top: 20px;
            height: 50px;
        }
        .home-button {
            position: absolute;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 24px;
            text-decoration: none;
            color: white;
        }
        .page-title {
            text-align: center;
            margin: 0;
            line-height: 50px;
        }
        .logout-button-container {
            position: absolute;
            right: 20px;
            top: 50%;
            transform: translateY(-50%);
        }
        .logout-button {
            font-size: 14px;
            text-decoration: none;
            color: white;
            background-color: #dc3545;
            padding: 8px 15px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        .logout-button:hover {
            background-color: #c82333;
        }

        .mypage-content {
            padding: 40px 20px;
            text-align: center;
            max-width: 800px;
            margin: 40px auto;
            background-color: #222;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5);
        }
        .mypage-content p {
            font-size: 1.1em;
            line-height: 1.6;
            margin-bottom: 20px;
        }
        .user-info-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }
        .user-info-item {
            margin-bottom: 15px;
            font-size: 1.05em;
        }
        .user-info-item strong {
            color: #007bff;
            margin-right: 10px;
        }

        /* 프로필 사진 관련 스타일 */
        .profile-picture-section {
            margin-bottom: 30px;
            padding-bottom: 20px;
            border-bottom: 1px solid #444;
        }
        .profile-picture-container {
            width: 120px;
            height: 120px;
            border-radius: 50%; /* 원형으로 만듦 */
            overflow: hidden; /* 원형 밖으로 나가는 부분 숨김 */
            margin: 0 auto 20px; /* 중앙 정렬 */
            border: 3px solid #007bff; /* 테두리 */
            display: flex; /* 이미지 중앙 정렬용 */
            justify-content: center;
            align-items: center;
        }
        .profile-picture-container img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* 이미지가 원형 영역을 꽉 채우도록 설정 */
        }
        .profile-picture-upload input[type="file"] {
            display: none; /* 기본 파일 선택 input 숨기기 */
        }
        .profile-picture-upload label {
            background-color: #007bff;
            color: white;
            padding: 8px 15px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9em;
            transition: background-color 0.3s ease;
        }
        .profile-picture-upload label:hover {
            background-color: #0056b3;
        }

        .action-buttons {
            margin-top: 30px;
        }
        .action-buttons button {
            background-color: #007bff;
            color: white;
            border: none;
            padding: 10px 20px;
            margin: 0 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 1em;
            transition: background-color 0.3s ease;
        }
        .action-buttons button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

<div class="header-container">
    <a href="/main" class="home-button">🏠</a>

    <h1 class="page-title">마이페이지</h1>

    <div class="logout-button-container">
        <form action="/auth/logout" method="post" style="display:inline;">
            <button type="submit" class="logout-button">
                로그아웃
            </button>
        </form>
    </div>
</div>

<form action="/delete" method="post" onsubmit="return confirm('정말 탈퇴하시겠습니까?');">
    <button type="submit" class="logout-button" style="background-color: gray;">회원 탈퇴</button>
</form>

<div class="mypage-content">
    <p>환영합니다! 이곳은 회원님의 개인 정보를 관리하고 활동 내역을 확인할 수 있는 마이페이지입니다.</p>

    <div class="profile-picture-section">
        <h2>프로필 사진</h2>
        <div class="profile-picture-container">
            <img id="profileImage" th:src="@{${profileImageUrl}}" alt="프로필 사진">
        </div>
        <div class="profile-picture-upload">
            <form id="profileUploadForm" action="/api/profile/upload" method="post" enctype="multipart/form-data">
                <input type="file" id="profilePictureInput" name="profilePicture" accept="image/*" onchange="this.form.submit()">
                <label for="profilePictureInput">사진 변경</label>
            </form>
        </div>
    </div>
    <div class="user-info-section">
        <h2>회원 정보</h2>
        <div class="user-info-item">
            <strong>아이디:</strong> <span th:text="${username}">user123</span> </div>
        <div class="user-info-item">
            <strong>이메일:</strong> <span th:text="${useremail}">user@example.com</span> </div>
    </div>

    <div class="action-buttons">
        <button onclick="alert('정보 수정 기능 예정');">정보 수정</button>
        <button onclick="alert('구매 내역 기능 예정');">구매 내역</button>
        <button onclick="alert('찜 목록 기능 예정');">찜 목록</button>
    </div>
</div>

<script>
    // 선택된 이미지 미리보기 기능
    document.getElementById('profilePictureInput').addEventListener('change', function(event) {
        if (event.target.files && event.target.files[0]) {
            var reader = new FileReader();
            reader.onload = function(e) {
                document.getElementById('profileImage').src = e.target.result;
            };
            reader.readAsDataURL(event.target.files[0]);
        }
    });
</script>

</body>
</html>
