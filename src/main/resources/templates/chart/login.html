<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>로그인</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background-color: #f4f4f4;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      background-color: white;
      padding: 2rem;
      border-radius: 12px;
      box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
      width: 350px;
    }

    h2 {
      text-align: center;
      margin-bottom: 1.5rem;
    }

    input[type="text"],
    input[type="password"] {
      width: 100%;
      padding: 0.7rem;
      margin-bottom: 1rem;
      border: 1px solid #ccc;
      border-radius: 8px;
    }

    button {
      width: 100%;
      padding: 0.8rem;
      background-color: #007bff;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    button:hover {
      background-color: #0056b3;
    }

    .msg {
      text-align: center;
      margin-top: 1rem;
      color: green;
    }

    .msg.error { /* 이 클래스를 사용하여 빨간색 오류 메시지를 표시합니다. */
      color: red;
      font-weight: bold;
    }

    .reset-container {
      text-align: center;
      margin-top: 0.5rem;
    }

    .reset-btn,
    .signup-btn {
      background: none;
      border: none;
      color: #007bff;
      font-size: 0.9rem;
      cursor: pointer;
      padding: 0;
      outline: none;
    }

    .reset-btn:hover,
    .signup-btn:hover {
      text-decoration: underline;
      color: rgba(128, 128, 128, 0.5);
      background-color: transparent;
    }
  </style>
</head>
<body>
<div class="container">
  <h2>로그인</h2>
  <form id="login-form" method="POST" action="/login">
    <input type="text" name="username" placeholder="아이디" required>
    <input type="password" name="password" placeholder="비밀번호" required>
    <button type="submit">로그인</button>
  </form>
  <div class="reset-container">
    <button type="button" class="reset-btn" onclick="location.href='/reset-password'">비밀번호 재설정</button>
    <button type="button" class="signup-btn" onclick="location.href='/join'">회원가입</button>
  </div>
  <div class="msg" id="result"></div>
</div>

<script>
  const urlParams = new URLSearchParams(window.location.search);
  const error = urlParams.get('error');

  const resultDiv = document.getElementById('result');

  if(error === 'true'){
    resultDiv.textContent = '로그인 실패: 아이디 또는 비밀번호를 확인해주세요.';
    resultDiv.classList.add('error');
  }

</script>


</body>
</html>
